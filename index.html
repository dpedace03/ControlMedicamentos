<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Medicación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="saludo" class="saludo"></div>

        <h2>💊 Control de Medicación</h2>
        
        <form id="medForm">
            <div class="input-group">
                <label>Tu nombre</label>
                <input type="text" id="nombre" placeholder="Ej: María" required>
                <small class="hint">Se recuerda en este dispositivo</small>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Fecha</label>
                    <input type="date" id="fecha" required>
                </div>
                <div class="input-group">
                    <label>Hora</label>
                    <input type="time" id="hora" required>
                </div>
            </div>

            <div class="input-group">
                <label>Medicamento</label>
                <select id="medicamento" required>
                    <option value="">-- Seleccioná un medicamento --</option>
                </select>
            </div>

            <div class="input-group">
                <label>Cantidad / Dosis</label>
                <input type="text" id="cantidad" placeholder="Ej: 1 comprimido" value="1" required>
            </div>

            <button type="submit" id="btnGuardar">Registrar Toma</button>
        </form>

        <div id="statusMessage"></div>

        <div class="history-section">
            <h3>📋 Historial de Tomas</h3>

            <div class="filtros">
                <div class="input-group">
                    <label>Buscar por fecha</label>
                    <input type="date" id="filtrFecha">
                </div>
                <div class="input-group">
                    <label>Buscar por medicamento</label>
                    <select id="filtroMed">
                        <option value="">Todos</option>
                    </select>
                </div>
                <button type="button" id="btnLimpiar" class="btn-secundario">Limpiar filtros</button>
            </div>

            <div id="listaMedicamentos">
                <p style="text-align:center; color:#999;">Cargando registros...</p>
            </div>
        </div>
    </div>

    <!-- Botón flotante Total -->
    <button id="btnTotal" class="btn-flotante">📊 Total</button>

    <!-- Modal Total -->
    <div id="modalTotal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>📊 Totales por medicamento</h3>
                <button id="cerrarModal" class="btn-cerrar">✕</button>
            </div>
            <div class="modal-tabs">
                <button class="tab-btn active" data-periodo="dia">Hoy</button>
                <button class="tab-btn" data-periodo="semana">Semana</button>
                <button class="tab-btn" data-periodo="mes">Mes</button>
            </div>
            <div id="contenidoTotal"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="apps.js"></script>
</body>
</html>
