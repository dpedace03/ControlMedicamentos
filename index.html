<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Pupy</title>
    <link rel="stylesheet" href="styles.css?v=20">
</head>
<body>
    <div class="container">
        <div id="saludo" class="saludo"></div>

        <h2>📔 Diario Pupy</h2>
        
        <form id="medForm">
            <div class="input-group">
                <label>Tu nombre</label>
                <input type="text" id="nombre" placeholder="Ej: María" required>
                <small class="hint">Se recuerda en este dispositivo</small>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Fecha</label>
                    <input type="date" id="fecha" required>
                </div>
                <div class="input-group">
                    <label>Hora</label>
                    <input type="time" id="hora" required>
                </div>
            </div>

            <div class="input-group">
                <label>Medicamento</label>
                <select id="medicamento" required>
                    <option value="">-- Seleccioná un medicamento --</option>
                </select>
            </div>

            <div class="input-group">
                <label>Cantidad / Dosis</label>
                <input type="text" id="cantidad" placeholder="Ej: 1 comprimido" value="1" required>
            </div>

            <div class="botones-fila">
                <button type="submit" id="btnGuardar" class="btn-principal">💊 Med</button>
                <button type="button" id="btnSat" class="btn-accion btn-sat">💉 Sat</button>
                <button type="button" id="btnSueno" class="btn-accion btn-sueno">😴 Sueño</button>
            </div>

            <div class="botones-fila">
                <button type="button" class="btn-comida btn-des" data-tipo="DES" data-nombre="Desayuno">🥐 DES</button>
                <button type="button" class="btn-comida btn-alm" data-tipo="ALM" data-nombre="Almuerzo">🍽️ ALM</button>
                <button type="button" class="btn-comida btn-mer" data-tipo="MER" data-nombre="Merienda">☕ MER</button>
                <button type="button" class="btn-comida btn-cen" data-tipo="CEN" data-nombre="Cena">🌙 CEN</button>
            </div>
        </form>

        <div id="statusMessage"></div>

        <div class="history-section">
            <h3>📋 Historial</h3>

            <div class="tabs-historial">
                <button type="button" class="tab-hist active" data-tipo="med">💊 Med</button>
                <button type="button" class="tab-hist" data-tipo="sat">💉 Sat</button>
                <button type="button" class="tab-hist" data-tipo="sueno">😴 Sueño</button>
                <button type="button" class="tab-hist" data-tipo="comida">🍽️ Comidas</button>
            </div>

            <div class="filtros">
                <div class="input-group">
                    <label>Buscar por fecha</label>
                    <input type="date" id="filtrFecha">
                </div>
                <div class="input-group" id="grupoFiltroMed">
                    <label>Buscar por medicamento</label>
                    <select id="filtroMed">
                        <option value="">Todos</option>
                    </select>
                </div>
                <button type="button" id="btnLimpiar" class="btn-secundario">Limpiar filtros</button>
            </div>

            <div id="listaHistorial">
                <p style="text-align:center; color:#999;">Cargando registros...</p>
            </div>
        </div>

        <div class="stock-section">
            <h3>📦 Stock Actual</h3>
            <div id="tablaStockActual"></div>
        </div>
    </div>

    <!-- Botones flotantes -->
    <div class="botones-flotantes">
        <button id="btnStock" class="btn-flotante btn-stock">📦 Stock</button>
        <button id="btnInforme" class="btn-flotante btn-informe">📝 Informe</button>
        <button id="btnTotal" class="btn-flotante">📊 Total</button>
    </div>

    <!-- Modal Total -->
    <div id="modalTotal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>📊 Totales por medicamento</h3>
                <button class="btn-cerrar" data-cerrar="modalTotal">✕</button>
            </div>
            <div class="modal-tabs">
                <button class="tab-btn active" data-periodo="dia">Hoy</button>
                <button class="tab-btn" data-periodo="semana">Semana</button>
                <button class="tab-btn" data-periodo="mes">Mes</button>
            </div>
            <div id="contenidoTotal"></div>
        </div>
    </div>

    <!-- Modal Saturación -->
    <div id="modalSat" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-centrado">
            <div class="modal-header">
                <h3>💉 Registrar Saturación</h3>
                <button class="btn-cerrar" data-cerrar="modalSat">✕</button>
            </div>
            <div class="modal-contenido">
                <button type="button" id="btnFotoSat" class="btn-foto">📷 Tomar foto del oxímetro</button>
                <input type="file" id="inputFoto" accept="image/*" capture="environment" style="display:none;">
                <div id="ocrEstado" class="ocr-estado" style="display:none;"></div>

                <div class="row">
                    <div class="input-group">
                        <label>SAT:</label>
                        <input type="number" id="satValor" min="0" max="100" maxlength="3" placeholder="Ej: 96" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>FC:</label>
                        <input type="number" id="fcValor" min="0" max="300" maxlength="3" placeholder="Ej: 107" autocomplete="off">
                    </div>
                </div>
                <div id="satResultado" class="resultado-sat"></div>
                <button type="button" id="btnGuardarSat" class="btn-principal" style="margin-top:10px;">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Sueño -->
    <div id="modalSueno" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-centrado">
            <div class="modal-header">
                <h3>😴 ¿Cómo durmió?</h3>
                <button class="btn-cerrar" data-cerrar="modalSueno">✕</button>
            </div>
            <div class="modal-contenido">
                <div class="input-group">
                    <label>Estado</label>
                    <select id="suenoEstado">
                        <option value="">-- Seleccioná --</option>
                        <option value="Bien">1 - Bien</option>
                        <option value="Muy Bien">2 - Muy Bien</option>
                        <option value="Mal">3 - Mal</option>
                    </select>
                </div>
                <div id="suenoResultado" class="resultado-sueno"></div>
                <div class="input-group">
                    <label>Observaciones</label>
                    <textarea id="suenoObs" rows="3" placeholder="Comentarios opcionales..."></textarea>
                </div>
                <button type="button" id="btnGuardarSueno" class="btn-principal">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Informe -->
    <div id="modalInforme" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>📝 Informe</h3>
                <button class="btn-cerrar" data-cerrar="modalInforme">✕</button>
            </div>
            <div class="modal-tabs">
                <button class="tab-inf active" data-periodo="dia">Hoy</button>
                <button class="tab-inf" data-periodo="semana">Semana</button>
                <button class="tab-inf" data-periodo="mes">Mes</button>
            </div>
            <div id="contenidoInforme" class="contenido-informe"></div>
        </div>
    </div>

    <!-- Modal Clave Stock -->
    <div id="modalClave" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-centrado">
            <div class="modal-header">
                <h3>🔒 Acceso a Stock</h3>
                <button class="btn-cerrar" data-cerrar="modalClave">✕</button>
            </div>
            <div class="modal-contenido">
                <div class="input-group">
                    <label>Ingresá la clave:</label>
                    <input type="password" id="claveStock" placeholder="••••" autocomplete="off">
                </div>
                <div id="claveError" class="resultado-sat" style="display:none;"></div>
                <button type="button" id="btnVerificarClave" class="btn-principal">Continuar</button>
            </div>
        </div>
    </div>

    <!-- Modal Cargar Stock -->
    <div id="modalStock" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>📦 Cargar Stock</h3>
                <button class="btn-cerrar" data-cerrar="modalStock">✕</button>
            </div>
            <div class="modal-contenido">
                <div id="listaStock"></div>
                <button type="button" id="btnGuardarStock" class="btn-principal" style="margin-top:15px;">Guardar cambios</button>
            </div>
        </div>
    </div>

    <!-- Modal Comida -->
    <div id="modalComida" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-centrado">
            <div class="modal-header">
                <h3 id="comidaTitulo">🍽️ Comida</h3>
                <button class="btn-cerrar" data-cerrar="modalComida">✕</button>
            </div>
            <div class="modal-contenido">
                <div class="input-group">
                    <label>¿Qué comió?</label>
                    <textarea id="comidaTexto" rows="4" placeholder="Describí qué comió..."></textarea>
                </div>
                <button type="button" id="btnGuardarComida" class="btn-principal" style="width:100%;">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Toast de avisos -->
    <div id="toast" class="toast" style="display:none;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <script src="apps.js?v=20"></script>
</body>
</html>
